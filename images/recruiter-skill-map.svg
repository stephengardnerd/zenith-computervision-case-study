<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">VisionZen recruiter skill map</title>
  <desc id="desc">Skill map showing AI product management, realtime systems, iOS wearables, computer vision, privacy, and platform engineering around VisionZen.</desc>
  <defs>
    <style>
      .title{font-family:Inter,Arial,sans-serif;fill:#f8fafc;font-size:34px;font-weight:800}
      .node{font-family:Inter,Arial,sans-serif;fill:#f8fafc;font-size:20px;font-weight:800}
      .body{font-family:Inter,Arial,sans-serif;fill:#cbd5e1;font-size:14px}
      .line{stroke:#64748b;stroke-width:3}
    </style>
  </defs>
  <rect width="1200" height="620" rx="28" fill="#0f172a"/>
  <text x="60" y="74" class="title">Recruiter skill map</text>
  <circle cx="600" cy="320" r="92" fill="#111827" stroke="#f59e0b" stroke-width="5"/>
  <text x="548" y="310" class="node">VisionZen</text>
  <text x="524" y="342" class="body">wearable AI assistant</text>
  <g>
    <line class="line" x1="535" y1="255" x2="315" y2="150"/>
    <line class="line" x1="665" y1="255" x2="890" y2="150"/>
    <line class="line" x1="508" y1="320" x2="250" y2="320"/>
    <line class="line" x1="692" y1="320" x2="950" y2="320"/>
    <line class="line" x1="535" y1="385" x2="315" y2="490"/>
    <line class="line" x1="665" y1="385" x2="890" y2="490"/>
  </g>
  <g transform="translate(135 92)">
    <rect width="280" height="116" rx="20" fill="#1e293b" stroke="#38bdf8" stroke-width="3"/>
    <text x="24" y="38" class="node">Computer vision</text>
    <text x="24" y="68" class="body">visual bursts, uncertainty,</text>
    <text x="24" y="92" class="body">task-specific image use</text>
  </g>
  <g transform="translate(785 92)">
    <rect width="280" height="116" rx="20" fill="#1e293b" stroke="#a78bfa" stroke-width="3"/>
    <text x="24" y="38" class="node">Realtime AI</text>
    <text x="24" y="68" class="body">voice loop, interruption,</text>
    <text x="24" y="92" class="body">session state, playback</text>
  </g>
  <g transform="translate(80 262)">
    <rect width="300" height="116" rx="20" fill="#1e293b" stroke="#22c55e" stroke-width="3"/>
    <text x="24" y="38" class="node">iOS + wearables</text>
    <text x="24" y="68" class="body">Xcode signing, device install,</text>
    <text x="24" y="92" class="body">Meta registration + camera</text>
  </g>
  <g transform="translate(820 262)">
    <rect width="300" height="116" rx="20" fill="#1e293b" stroke="#fb923c" stroke-width="3"/>
    <text x="24" y="38" class="node">Cloud bridge</text>
    <text x="24" y="68" class="body">contracts, health, policy,</text>
    <text x="24" y="92" class="body">billing gates, grounding</text>
  </g>
  <g transform="translate(135 432)">
    <rect width="280" height="116" rx="20" fill="#1e293b" stroke="#ef4444" stroke-width="3"/>
    <text x="24" y="38" class="node">Cost + privacy</text>
    <text x="24" y="68" class="body">API breaker, no idle uploads,</text>
    <text x="24" y="92" class="body">public-safe documentation</text>
  </g>
  <g transform="translate(785 432)">
    <rect width="280" height="116" rx="20" fill="#1e293b" stroke="#eab308" stroke-width="3"/>
    <text x="24" y="38" class="node">AI product systems</text>
    <text x="24" y="68" class="body">field UX, fallback lanes,</text>
    <text x="24" y="92" class="body">human-centered workflow</text>
  </g>
</svg>

