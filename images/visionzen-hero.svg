    <rect x="18" y="32" width="134" height="220" rx="18" fill="#f8fafc"/>
    <rect x="38" y="62" width="94" height="18" rx="9" fill="#22c55e"/>
    <rect x="38" y="102" width="94" height="18" rx="9" fill="#3b82f6"/>
    <rect x="38" y="142" width="94" height="18" rx="9" fill="#a78bfa"/>
    <circle cx="85" cy="274" r="11" fill="#334155"/>
    <text x="-12" y="344" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">iPhone field mode</text>
    <text x="-22" y="376" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="17">permission, stream, controls</text>
  </g>
  <g transform="translate(815 220)" filter="url(#softGlow)">
