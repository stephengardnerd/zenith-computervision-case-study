<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">VisionZen wearable AI assistant concept</title>
  <desc id="desc">A polished concept graphic showing Meta glasses, an iPhone bridge, a cloud bridge, and the Zenith assistant loop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.48" stop-color="#101827"/>
      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="aura" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.55" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="620" rx="32" fill="url(#bg)"/>
  <circle cx="940" cy="120" r="170" fill="#0ea5e9" opacity="0.12"/>
  <circle cx="140" cy="500" r="210" fill="#8b5cf6" opacity="0.12"/>
  <text x="72" y="106" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800">VisionZen</text>
  <text x="76" y="146" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="22">Wearable computer vision companion for hands-free field assistance</text>
  <g transform="translate(98 246)">
