    <circle cx="88" cy="44" r="23" fill="#0f172a" stroke="#38bdf8" stroke-width="7"/>
    <circle cx="228" cy="44" r="23" fill="#0f172a" stroke="#38bdf8" stroke-width="7"/>
    <text x="10" y="126" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Meta Ray-Ban glasses</text>
    <text x="10" y="158" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="17">camera frames + field context</text>
  </g>
  <g transform="translate(482 210)">
