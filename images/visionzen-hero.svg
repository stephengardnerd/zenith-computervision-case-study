    <path d="M105 -20 L114 4 L140 4 L119 19 L127 44 L105 29 L83 44 L91 19 L70 4 L96 4 Z" fill="#f59e0b"/>
    <text x="-22" y="254" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Z / Zen / Zenith</text>
    <text x="-60" y="286" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="17">voice, visual bursts, grounded help</text>
  </g>
